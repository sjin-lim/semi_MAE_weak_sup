# ============================================================
# semi_MAE — DINOv3 ViT-B v7 High-Resolution Adaptation
#
# 목적:
#   v7_combined (150 epoch 학습 완료) teacher 에서 resume,
#   high-resolution adaptation 으로 추론 해상도 안정성 확보.
#
# v5a 와의 차이:
#   - v5a 는 v4_ibot_ft 위에 high-res adapt → 1-2 confusion 가진 채 진행
#   - v7_hires 는 augmentation/masking 개선된 v7 위에 high-res adapt
#   - 더 깨끗한 base 에서 high-res 적응 → 추론 시 1-2 분리 보존 + 해상도 안정
#
# 핵심 설정:
#   - global crop 448 → {512, 768} 혼합
#   - Gram OFF (v5a 와 동일 — 1-2 representation lock-in 회피)
#   - 10 epoch (DINOv3 논문 권장)
#   - augmentation/masking: v7 와 동일 (변수 격리)
#
# 학습량:
#   10 epoch × 1280 step = 12,800 total steps
#   ≈ 10~13 시간 (ViT-B + 768 max + batch 32/GPU)
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_vitb_v7_hires_adapt.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       train.output_dir=/path/to/output_v7_hires_adapt \
#       student.resume_from_teacher_chkpt=/path/to/v7_combined/eval/.../teacher_checkpoint.pth
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: false   # v7 과 동일 (랜덤 마스킹 유지)
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./output_dino_em_vitb_v7_hires_adapt"

  batch_size_per_gpu: 32             # high-res 라 v5a 와 동일하게 축소
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 1280

  saveckp_freq: 2
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''       # CLI override (v7 teacher)
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.999
  final_momentum_teacher: 0.9999
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 10
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  # ── Mixed-resolution global crops ──────────────────────────────────
  global_crops_size:
    - 512
    - 768
  local_crops_size:
    - 128
    - 192
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  global_local_crop_pairs_ratios:
    - 0.5
    - 0.5
  gram_teacher_crops_size:           # gram OFF 라 미사용, default 유지
    - 512
    - 768
  gram_teacher_no_distortions: true
  localcrops_subset_of_globalcrops: false
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  # ── v7 과 동일한 augmentation 설정 (변수 격리) ──────────────────────
  clahe: false
  intensity_aug:
    clahe_p: 0.0
    gamma_p: 0.5
    poisson_p: 0.3
    disk_blur_p_global1: 0.3
    disk_blur_p_global2: 0.05
    disk_blur_p_local: 0.2
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1600
  max_to_keep: 5
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 3200

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 1.25e-05                    # high-res adapt: 매우 낮음
    end: 1.0e-06
    warmup_epochs: 1
    freeze_last_layer_epochs: 0
    cosine_epochs: 9
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.9999
    warmup_epochs: 0
