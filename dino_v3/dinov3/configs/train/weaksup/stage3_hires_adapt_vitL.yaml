# ============================================================
# Stage 3 (ViT-L): 1k Mixed-Resolution Adaptation (Gram OFF, weak-sup light)
#
# stage3_hires_adapt.yaml(ViT-B)의 ViT-L 판. B→L 변경 (최소):
#   - student.arch  vit_base → vit_large
#   - dino/ibot head_hidden_dim 1024 → 2048, dino head_n_prototypes → 65536
#   - batch 16 → 8 (L + 1024 crop 은 메모리 큼; 여유되면 ↑)
#   - 그 외(혼합 해상도 768/1024, gram off, hinge weak-sup, wave) 동일
#
# 출발점: Stage 2(vitL long) teacher checkpoint.
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/weaksup/stage3_hires_adapt_vitL.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       weak_sup.labeled_root=/path/to/labeled_data \
#       student.resume_from_teacher_chkpt=/path/to/stage2_long_vitL/eval/.../teacher_checkpoint.pth \
#       train.output_dir=./out/stage3_1k_vitL
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 65536            # L
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048              # L
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: false
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048             # L

gram:
  # Gram OFF 로 시작 (안 써본 상태). degrade 시 use_loss:true + ckpt=stage2 teacher.
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

weak_sup:
  enabled: true
  labeled_root: ''
  labeled_ratio: 0.15
  num_workers_labeled: 4
  batch_size_labeled: 4
  margin: 0.85
  hinge_power: 2.0
  lambda_W: 10.0
  warmup_steps: 200
  background_class: 0
  skip_background: true
  min_patches_per_class: 4
  min_nonbg_classes: 2
  patch_purity_threshold: 0.8
  ignore_label: -1
  log_pair_stats: true

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./out/stage3_1k_vitL"

  batch_size_per_gpu: 8              # L + 1024 → 16에서 8로 축소 (여유되면 ↑)
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 1280

  saveckp_freq: 2
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_large                    # ← B→L 핵심
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  # ── DINOv3 공식 ViT-L(lvd1689m) RoPE — 공개 weight 와 일치 필수 (iBOT 학습 조건) ──
  pos_embed_type: ropenew
  pos_embed_grid_size: 48
  pos_embed_rope_base: 100
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_dtype: bf16
  pos_embed_rope_gamma: 1.0
  pos_embed_rope_rescale_coords: 2    # RoPE → 해상도 확장/외삽

teacher:
  momentum_teacher: 0.999
  final_momentum_teacher: 0.9999
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 10
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  # 혼합 해상도 768 + 1024 (1k native). 네 리스트 길이 일치 필수.
  global_crops_size:
    - 768
    - 1024
  local_crops_size:
    - 192
    - 256
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  global_local_crop_pairs_ratios:
    - 0.5
    - 0.5
  gram_teacher_crops_size:
    - 768
    - 1024
  gram_teacher_no_distortions: true
  localcrops_subset_of_globalcrops: false
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: false
  intensity_aug:
    clahe_p: 0.0
    gamma_p: 0.0
    poisson_p: 0.3
    disk_blur_p_global1: 0.1
    disk_blur_p_global2: 0.0
    disk_blur_p_local: 0.1
  wave_aug:
    enabled: true
    k_lo: 0.001
    k_hi: 0.0031
    amp: 0.12
    direction: null
    dir_width: 30.0
    p: 0.5
    amp_jitter: true
    mode: mult
    spatial_envelope_p: 0.3
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1600
  max_to_keep: 5
  keep_every: 6400

evaluation:
  eval_period_iterations: 3200

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 1.25e-05
    end: 1.0e-06
    warmup_epochs: 1
    freeze_last_layer_epochs: 0
    cosine_epochs: 9
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.9999
    warmup_epochs: 0
