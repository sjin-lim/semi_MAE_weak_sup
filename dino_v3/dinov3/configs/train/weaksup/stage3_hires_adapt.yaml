# ============================================================
# Stage 3: High-Resolution Adaptation (Weak Sup Retained, Light)
#
# 목적:
#   Stage 2 backbone 의 분리 능력 보존하면서 추론 해상도 확장 적응.
#   Weak sup 유지 (light) — Stage 2 학습 결과가 high-res 학습에서 무력화되는 것 방지.
#
# 출발점:
#   Stage 2 teacher checkpoint.
#
# 핵심 설정:
#   - global crop {512, 768} 혼합
#   - weak_sup lambda 축소 (20 → 5, preservation)
#   - 10 epoch 짧게
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/weaksup/stage3_hires_adapt.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       weak_sup.labeled_root=/path/to/labeled_data \
#       student.resume_from_teacher_chkpt=./out/stage2/.../teacher_checkpoint.pth \
#       train.output_dir=./out/stage3
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: false
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

# ── NEW: weak supervision light (preservation) ─────────────────────────
weak_sup:
  enabled: true
  labeled_root: ''
  labeled_ratio: 0.15             # 0.25 → 0.15 (high-res 가 main goal)
  num_workers_labeled: 4
  batch_size_labeled: 4
  T: 8.0
  lambda_W: 5.0                   # 20 → 5 (light preservation, not main learning)
  warmup_steps: 200
  background_class: 0
  skip_background: true
  min_patches_per_class: 4
  min_nonbg_classes: 2            # non-bg class 2개 미만 image 제외 (Stage 2 와 동일)
  patch_purity_threshold: 0.8     # boundary patch ignore (Stage 2 와 동일). 0.0=off
  ignore_label: -1
  log_pair_stats: true

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./out/stage3"

  # High-res 라 batch 축소
  batch_size_per_gpu: 32
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 1280

  saveckp_freq: 2
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''       # CLI override (Stage 2 teacher)
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.999
  final_momentum_teacher: 0.9999
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 10
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  # Mixed-resolution global crops
  global_crops_size:
    - 512
    - 768
  local_crops_size:
    - 128
    - 192
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  global_local_crop_pairs_ratios:
    - 0.5
    - 0.5
  gram_teacher_crops_size:
    - 512
    - 768
  gram_teacher_no_distortions: true
  localcrops_subset_of_globalcrops: false
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: false
  intensity_aug:
    # 밝기 aug 최소화 (docs/ANALYSIS_grayscale_separation.md §5,6):
    # gamma/CLAHE = K1(절대레벨 invariance 강제) 주범 → off.
    # disk_blur = K3(경계 흐림) 악화 → 약화. poisson(노이즈)·기하·masking 은 유지(SSL 핵심).
    clahe_p: 0.0
    gamma_p: 0.0
    poisson_p: 0.3
    disk_blur_p_global1: 0.1
    disk_blur_p_global2: 0.0
    disk_blur_p_local: 0.1
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1600
  max_to_keep: 5
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 3200

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 1.25e-05
    end: 1.0e-06
    warmup_epochs: 1
    freeze_last_layer_epochs: 0
    cosine_epochs: 9
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.9999
    warmup_epochs: 0
