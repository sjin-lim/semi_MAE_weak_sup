# ============================================================
# Stage 2: SSL + Weak Supervised (Per-Patch Pair-wise Hard Negative)
#
# 목적:
#   Stage 1 backbone 위에 labeled data 의 class 분리 신호 주입.
#   EM 의 visually-similar-but-semantically-different class pair 분리 능력 강화.
#
# 출발점:
#   Stage 1 teacher checkpoint.
#
# Weak sup loss 핵심:
#   - Per-patch pair-wise normalized exponential
#   - Class 0 (background) 제외
#   - Self-curriculum (sim 떨어지면 자동 weak)
#   - Bounded [0, 1]
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/weaksup/stage2_ssl_weaksup.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       weak_sup.labeled_root=/path/to/labeled_data \
#       student.resume_from_teacher_chkpt=./out/stage1/.../teacher_checkpoint.pth \
#       train.output_dir=./out/stage2
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: false
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

# ── NEW: weak supervision ON ───────────────────────────────────────────
weak_sup:
  enabled: true
  # ── Labeled data ───────────────────────────────────────────────────
  labeled_root: ''                # CLI override
  labeled_ratio: 0.25             # 매 step 25% 확률로 labeled batch 사용
  num_workers_labeled: 4
  batch_size_labeled: 16          # per-GPU labeled batch
  # ── Loss formulation ──────────────────────────────────────────────
  T: 8.0                          # exponential sharpness (half-max sim ≈ 0.91)
  lambda_W: 20.0                  # loss weight (bounded loss라 큰 값 OK)
  warmup_steps: 1000              # 0 → lambda_W 점진 증가
  # ── Patch handling ────────────────────────────────────────────────
  background_class: 0
  skip_background: true           # bg pair 제외
  min_patches_per_class: 4
  patch_purity_threshold: 0.8     # boundary patch (purity<0.8)는 ignore → cross-class noise 회피. 0.0=off
  ignore_label: -1
  # ── Monitoring ────────────────────────────────────────────────────
  log_pair_stats: true            # pair_sim_max/mean 등 logging

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./out/stage2"

  batch_size_per_gpu: 128
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 320

  saveckp_freq: 20
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''       # CLI override (Stage 1 teacher)
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.999             # Stage 2 보수적 (이미 안정)
  final_momentum_teacher: 0.9999
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 30                          # Stage 2: 짧게 (signal 주입만)
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: false
  intensity_aug:
    # 밝기 aug 최소화 (docs/ANALYSIS_grayscale_separation.md §5,6):
    # gamma/CLAHE = K1(절대레벨 invariance 강제) 주범 → off.
    # disk_blur = K3(경계 흐림) 악화 → 약화. poisson(노이즈)·기하·masking 은 유지(SSL 핵심).
    clahe_p: 0.0
    gamma_p: 0.0
    poisson_p: 0.3
    disk_blur_p_global1: 0.1
    disk_blur_p_global2: 0.0
    disk_blur_p_local: 0.1
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1200                        # 30 epoch × 320 / 8 = 1200
  max_to_keep: 6
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 1600        # 5 epoch 마다

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    # Stage 2 (교정 run): peak 1e-4. baked-in 반사-지배를 풀고 weak sup 물질 축을
    # 주입하려면 preservation LR(5e-5)로는 약함. layerwise_decay 0.9 가 깊은 층 더 움직임.
    # (sim[1,2] 정체 시 2e-4 로 상향 / 발산 시 5e-5 로 하향 — HANDOFF §11)
    peak: 0.0001
    end: 1.0e-06
    warmup_epochs: 3
    freeze_last_layer_epochs: 0
    cosine_epochs: 27
  momentum:
    start: 0.999
    peak: 0.999
    end: 0.9999
    warmup_epochs: 0
