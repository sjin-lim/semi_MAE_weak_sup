# ============================================================
# Stage 1: Pure SSL Fine-tuning (Weak Sup OFF)
#
# 목적:
#   EM 도메인 일반 representation 구축. 기존 DINOv3 코드 그대로 동작.
#   weak_sup.enabled: false → 학습 코드가 SSL only branch 로 분기.
#
# 출발점:
#   기존 v4_ibot_ft 또는 v7_combined teacher checkpoint 에서 resume 권장.
#   (이미 EM 도메인 적응된 모델 에서 출발)
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/weaksup/stage1_ssl_only.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       train.output_dir=./out/stage1 \
#       student.resume_from_teacher_chkpt=/path/to/prior_teacher.pth
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: false
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

# ── NEW: weak supervision OFF (Stage 1) ─────────────────────────────────
weak_sup:
  enabled: false
  labeled_root: ''
  labeled_ratio: 0.0
  T: 8.0
  lambda_W: 0.0
  warmup_steps: 0
  background_class: 0
  min_patches_per_class: 4
  skip_background: true
  patch_purity_threshold: 0.0
  log_pair_stats: false

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./out/stage1"

  batch_size_per_gpu: 128
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 320

  saveckp_freq: 20
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''       # CLI override
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.998
  final_momentum_teacher: 0.9999
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 60
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: false
  intensity_aug:
    clahe_p: 0.0
    gamma_p: 0.5
    poisson_p: 0.3
    disk_blur_p_global1: 0.3
    disk_blur_p_global2: 0.05
    disk_blur_p_local: 0.2
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 2400
  max_to_keep: 8
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 3200

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 0.0001
    end: 1.0e-06
    warmup_epochs: 5
    freeze_last_layer_epochs: 0
    cosine_epochs: 55
  momentum:
    start: 0.998
    peak: 0.998
    end: 0.9999
    warmup_epochs: 0
