# ============================================================
# semi_MAE — DINOv3 ViT-L iBOT 경계면 강화 추가학습 (vitL)
#
# ViT-B 검증 파이프라인(sem_mae_em_vitb_v4_ibot_ft.yaml)의 ViT-L 판.
# B→L 변경 (최소):
#   - student.arch  vit_base → vit_large
#   - dino/ibot head_hidden_dim 1024 → 2048 (pretrain-L 헤드와 일치)
#   - dino head_n_prototypes 32768 → 65536 (pretrain-L 과 일치, resume 위해 필수)
#   - 그 외(LR/epoch/iBOT 강화/EM aug) 동일
#
# 출발점: sem_mae_em_pretrain.yaml (이미 vit_large) 의 teacher checkpoint.
#
# ⚠️ 메모리: ViT-L 은 ~3.5× 파라미터. batch 128 이 OOM 이면 64 로 낮추고
#    OFFICIAL_EPOCH_LENGTH 를 2배(640)로 올려 총 이미지 노출을 유지.
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_vitL_ibot_ft.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       student.resume_from_teacher_chkpt=/path/to/vitL_pretrain/.../teacher_checkpoint.pth \
#       train.output_dir=/path/to/output_vitL_ibot_ft
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 65536            # L: 32768 → 65536 (pretrain-L 과 일치)
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048              # L: 1024 → 2048
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5                    # iBOT 강화 (B 와 동일)
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: true
  masking_temperature: 0.3
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048              # L: 1024 → 2048

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./output_dino_em_vitL_ibot_ft"

  batch_size_per_gpu: 128            # OOM 시 64 + OFFICIAL_EPOCH_LENGTH 640
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 320

  saveckp_freq: 10
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_large                    # ← B→L 핵심
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''      # CLI override (vitL pretrain teacher)
  drop_path_rate: 0.2               # finetune → 0.2 유지 (과적합 시 0.3)
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  # ── DINOv3 공식 ViT-L(lvd1689m) RoPE — 공개 weight 와 일치 필수 (iBOT 학습 조건) ──
  pos_embed_type: ropenew
  pos_embed_grid_size: 48
  pos_embed_rope_base: 100
  pos_embed_rope_normalize_coords: separate
  pos_embed_rope_dtype: bf16
  pos_embed_rope_gamma: 1.0
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.998
  final_momentum_teacher: 0.9995
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 50
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9              # L 24층 → 0.9^24≈0.08 로 하위층 보호 (충분)
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: true
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 2000
  max_to_keep: 5
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 3200

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 0.00005                   # L 이 불안정하면 3e-5 로 소폭 ↓
    end: 1.0e-06
    warmup_epochs: 5
    freeze_last_layer_epochs: 0
    cosine_epochs: 45
  momentum:
    start: 0.998
    peak: 0.998
    end: 0.9995
    warmup_epochs: 0
