# ============================================================
# semi_MAE — DINOv3 ViT-B Ablation v6c (모든 intensity aug OFF)
#
# 목적:
#   v6a (CLAHE off) + v6b (other intensity off) 결합.
#   모든 intensity augmentation 을 제거하여 1-2 분리 가능성 최대.
#
# 변수:
#   - CLAHE: OFF (v6a 와 동일)
#   - Gamma/Poisson/DiskBlur: ALL OFF (v6b 와 동일)
#   - Geometric aug (RandomResizedCrop, Flip, Elastic) 은 유지
#     - 이 영역은 1-2 boundary 신호와 직접 충돌 안 함
#
# 예상:
#   intensity 관련 SSL invariance 학습 완전 제거 →
#   1-2 의 옅은 회색 차이가 representation 에 더 잘 보존
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_vitb_v6c_all_intensity_off.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       train.output_dir=/path/to/output_v6c_all_intensity_off \
#       student.resume_from_teacher_chkpt=/path/to/v4_ibot_ft/.../teacher_checkpoint.pth
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: true
  masking_temperature: 0.3
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./output_dino_em_vitb_v6c_all_intensity_off"

  batch_size_per_gpu: 128
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 320

  saveckp_freq: 5
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.998
  final_momentum_teacher: 0.9995
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 30
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  # ── 핵심 변경: CLAHE OFF + 모든 intensity aug 확률 0 ──────────────────
  clahe: false
  intensity_aug:
    clahe_p: 0.0
    gamma_p: 0.0
    poisson_p: 0.0
    disk_blur_p_global1: 0.0
    disk_blur_p_global2: 0.0
    disk_blur_p_local: 0.0
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1600
  max_to_keep: 5
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 1600

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 0.00005
    end: 1.0e-06
    warmup_epochs: 3
    freeze_last_layer_epochs: 0
    cosine_epochs: 27
  momentum:
    start: 0.998
    peak: 0.998
    end: 0.9995
    warmup_epochs: 0
