# ============================================================
# semi_MAE — 전자현미경(TEM/SEM) 이미지 DINOv3 학습 설정
#
# 사용 시나리오:
#   이질적 소규모 데이터(~10만 장)에 pretrained weight를 초기화로 활용해 SSL 학습.
#   교사 없는 순수 SSL(SSLMetaArch) — pretrained backbone으로 student 초기화,
#   teacher는 student의 복사본에서 EMA로 시작.
#
# 실행:
#   cd dino_v3
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_pretrain.yaml \
#       train.dataset_path="SemiMAE:h5_path=/path/to/train.h5" \
#       train.output_dir=/path/to/output
#
# ── pretrained_weights 로드 흐름 ──────────────────────────────────────
#   do_train() → model.init_weights()
#     → student.backbone.init_weights()  [student.pretrained_weights 경로 로드]
#     → model_ema.load_state_dict(student.state_dict())  [teacher = student 복사]
#   ※ dino_head / ibot_head 는 랜덤 초기화 유지
#   ※ student.pretrained_weights 가 비어 있으면 random init (처음부터 학습)
#
# ── pretrained 모델과 아키텍처가 반드시 일치해야 하는 항목 ────────────
#   n_storage_tokens, mask_k_bias, qkv_bias, ffn_layer, norm_layer
#   불일치 시 load_state_dict strict=False 로 부분 로드되지만
#   구조가 크게 다르면 초기화 효과가 없어짐.
#
# dataset_path 형식 (SemiMAEDataset):
#   SemiMAE:h5_path=/path/to/file.h5
#   SemiMAE:csv_path=/path/to/train.pkl
#   SemiMAE:h5_path=/path/to/file.h5:use_filtered_target=true
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP  # FULL_SHARD는 동작하지 않음 (코드 assert)

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  # 10만 장 기준: 65536 prototypes ≈ dataset의 65% 커버 → 충분히 over-complete
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.1    # 이질적 데이터에서 representation 분산 유도 — 유지
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  # mask_ratio 상한: 0.5 → 0.3
  # 소규모 이질 데이터(10만장)에서 0.5는 패치의 절반이 가려져
  # 복원 불가능한 경우가 빈번 → iBOT loss가 노이즈 신호를 학습.
  # 0.3이면 "풀 수 있는 문제"를 유지하면서 patch-level representation 학습에 기여.
  mask_ratio_min_max:
    - 0.1
    - 0.3
  mask_random_circular_shift: false
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 2048

train:
  dataset_path: "SemiMAE:h5_path=<FILL_IN>/train_images.h5"
  output_dir: "./output_dino_em"

  # ── 배치 크기 ─────────────────────────────────────────────────────────
  # 4 GPU × 32 = global batch 128
  # 실제 epoch 길이: 100,000 / 128 ≈ 781 step (OFFICIAL_EPOCH_LENGTH 와 무관)
  batch_size_per_gpu: 32
  num_workers: 10
  seed: 0

  # ── OFFICIAL_EPOCH_LENGTH ──────────────────────────────────────────────
  # LR/WD/momentum 스케줄 계산에만 사용 (실제 데이터 반복 횟수와 무관).
  # 데이터 100K / batch 128 ≈ 781 step = 실제 1 epoch
  # epochs=100 × OFFICIAL_EPOCH_LENGTH=1250 = 총 125,000 step
  # = 데이터 약 160회 반복 (SSL 소규모 데이터 기준 적정)
  OFFICIAL_EPOCH_LENGTH: 1250

  saveckp_freq: 10          # pretrained init은 수렴이 빠르므로 체크포인트 자주 저장
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true             # 학습 속도 최적화 (디버깅 시에만 false)
  centering: sinkhorn_knopp

student:
  arch: vit_large
  patch_size: 16

  # ── pretrained weight 경로 ─────────────────────────────────────────────
  # DINOv3 형식 체크포인트 경로를 입력하세요.
  # 비워두면 random init (처음부터 학습).
  # 반드시 아래 아키텍처 파라미터(n_storage_tokens, mask_k_bias 등)와 일치해야 합니다.
  pretrained_weights: ''

  # ── Pretrained init 기준 drop_path_rate ──────────────────────────────
  # 처음부터 학습: 0.3 / pretrained init: 0.1~0.15
  # feature가 이미 좋은 상태에서 시작하므로 강한 regularization 불필요
  drop_path_rate: 0.1

  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.994
  # ── final_momentum_teacher ────────────────────────────────────────────
  # 처음부터 학습(대규모): 1.0 으로 올리는 것이 표준
  # Pretrained init + 소규모 데이터: 0.998 유지
  # 이유: 총 step이 적어 EMA가 충분히 수렴하기 전에 1.0에 가까워지면
  #        teacher가 stale해지는 현상이 발생할 수 있음
  final_momentum_teacher: 0.998
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 10  # 총 100 epoch의 10% — 처음부터 학습(15%)보다 짧게

optim:
  # ── epochs ───────────────────────────────────────────────────────────
  # 처음부터 학습: 200 / Pretrained init + 10만 장: 100
  # 125K total step = 데이터 약 160회 반복
  epochs: 100
  optimizer: adamw
  weight_decay: 0.04
  weight_decay_end: 0.1   # 처음부터 학습(0.2) 대비 낮춤 — pretrained feature 보호
  clip_grad: 3.0
  freeze_last_layer_epochs: 1
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9    # 하위 레이어는 더 낮은 LR (pretrained feature 보호)
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  # local crop 하한 0.05 → 0.10: 너무 작은 crop은 EM에서 균일 배경만 포착
  # edge 포함 확률↑ → iBOT patch-level 학습 품질 향상
  local_crops_scale:
    - 0.10
    - 0.32
  local_crops_number: 6
  horizontal_flips: true
  share_color_jitter: false
  # instance_norm: true → PerImageNormalize (이질적 TEM/SEM 도메인에 필수)
  instance_norm: true
  clahe: false             # v1은 CLAHE 비활성 (ablation 기준선)
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 3750
  max_to_keep: 5          # 100 epoch으로 줄었으므로 더 많이 보관
  keep_every: 99999999999999

schedules:
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.1              # optim.weight_decay_end 와 일치
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 10     # teacher.warmup_teacher_temp_epochs 와 일치
  lr:
    start: 0
    # ── LR peak ────────────────────────────────────────────────────────
    # 처음부터 학습: 0.0005 / Pretrained init: 0.0002 (3배 낮춤)
    # sqrt_wrt_1024 scaling 후 실제 적용 LR:
    #   4 × sqrt(32 × 4 / 1024) × 0.0002 ≈ 0.000283 (4GPU, 32/GPU)
    peak: 0.0002
    end: 1.0e-06
    warmup_epochs: 10     # Pretrained init → 전체의 10% 로 단축
    freeze_last_layer_epochs: 1
    cosine_epochs: 90     # warmup(10) + cosine(90) = 100 총 epoch
  momentum:
    start: 0.994
    peak: 0.994
    end: 0.998            # final_momentum_teacher 와 일치
    warmup_epochs: 0
