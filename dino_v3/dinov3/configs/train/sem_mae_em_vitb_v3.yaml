# ============================================================
# semi_MAE — 전자현미경(TEM/SEM) 이미지 DINOv3 학습 설정 (v3 / ViT-B)
#
# v2 (ViT-L) 대비 변경 사항:
#   - ViT-L → ViT-B 전환 (304M → 86M params)
#   - 데이터 ~110K (dedup 후) 에 맞춰 하이퍼파라미터 재조정
#   - batch_size 128 → 96/GPU (ViT-B는 가벼워 더 올릴 수 있으나 데이터 대비 배치 다양성 유지)
#   - LR peak 0.0003 → 0.0002 (데이터 적음 → 과적합 방지)
#   - epochs 100 → 200 (총 이미지 노출량 확보: 110K × 200epoch ≈ 22M)
#   - drop_path_rate 0.15 → 0.2 (regularization 강화)
#   - weight_decay_end 0.12 → 0.15
#   - layerwise_decay 0.93 → 0.85 (ViT-B depth=12, 0.85^12 ≈ 14% — 하위 레이어 보호)
#   - head_hidden_dim 2048 → 1024 (ViT-B embed_dim=768에 맞춤)
#   - head_n_prototypes 65536 → 32768 (110K 데이터 대비 적정)
#   - ibot head_n_prototypes 32768 → 16384
#   - warmup 15 → 20 epoch (총 epoch 대비 10%, pretrained 보호)
#   - max_per_cluster 50 (15만 원본 기준 보수적 dedup)
#
# 설계 철학:
#   ViT-B는 10만 장 규모에서 파라미터/데이터 비율이 적정.
#   빠른 실험 반복(ViT-L 대비 ~3x)으로 최적 config 탐색 후,
#   데이터 30만+ 확보 시 ViT-L 스케일업.
#
# 실행:
#   cd dino_v3
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_vitb_v3.yaml \
#       train.dataset_path="SemiMAE:h5_path=/path/to/train_deduped.h5" \
#       train.output_dir=/path/to/output
#
# dataset_path 형식:
#   SemiMAE:h5_path=/path/to/file.h5
#   WebDataset:path=/path/to/shards:min_std=5.0
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  # 110K 데이터: 32768 prototypes ≈ dataset의 30% → over-complete
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  # ViT-B embed_dim=768 → head_hidden_dim 2048→1024
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.3
  mask_random_circular_shift: false
  information_aware_masking: true
  masking_temperature: 0.5
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 16384
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

train:
  dataset_path: "SemiMAE:h5_path=<FILL_IN>/train_deduped.h5"
  output_dir: "./output_dino_em_vitb_v3"

  # ── 배치 크기 ─────────────────────────────────────────────────────────
  # 4 GPU × 96 = global batch 384
  # ViT-B는 더 올릴 수 있으나, 110K 데이터 대비 배치 다양성 유지
  batch_size_per_gpu: 96
  num_workers: 10
  seed: 0

  # ── OFFICIAL_EPOCH_LENGTH ──────────────────────────────────────────────
  # 110K / 384 ≈ 286 step = 실제 1 epoch
  # epochs=200 × OFFICIAL_EPOCH_LENGTH=300 = 총 60,000 step
  # = 데이터 약 210회 반복
  # 총 이미지 노출: 110K × 210 ≈ 23M
  OFFICIAL_EPOCH_LENGTH: 300

  saveckp_freq: 20
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''

  # ── drop_path_rate: 0.2 ──────────────────────────────────────────────
  # 110K 데이터 → 과적합 위험↑ → regularization 강화
  drop_path_rate: 0.2

  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.994
  # 110K × 200epoch에서 teacher stale 방지 → 0.998 유지
  final_momentum_teacher: 0.998
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 20

optim:
  epochs: 200
  optimizer: adamw
  weight_decay: 0.04
  # ── weight_decay_end: 0.15 ──────────────────────────────────────────
  # 소규모 데이터 → 후반부 regularization 강화
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 1
  scaling_rule: sqrt_wrt_1024

  # ── layerwise_decay: 0.85 ──────────────────────────────────────────
  # ViT-B depth=12: 하위 레이어 LR ≈ peak × 0.85^12 ≈ 14%
  # ViT-L(depth=24, decay=0.93)과 비슷한 하위 레이어 비율 유지
  layerwise_decay: 0.85

  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.10
    - 0.32
  local_crops_number: 6
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  clahe: true
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  # 60,000 total step / 5 ≈ 12,000 step 간격
  period: 3000
  max_to_keep: 5
  keep_every: 99999999999999

schedules:
  weight_decay:
    start: 0.04
    peak: 0.04
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.04
    peak: 0.07
    end: 0.07
    warmup_epochs: 20
  lr:
    start: 0
    # ── LR peak: 0.0002 ──────────────────────────────────────────────
    # 110K 데이터 → 보수적 LR
    # sqrt_wrt_1024 scaling 후 실제 적용 LR:
    #   4 × sqrt(96 × 4 / 1024) × 0.0002 ≈ 0.000490 (4GPU, 96/GPU)
    peak: 0.0002
    end: 1.0e-06
    # ── warmup: 20 epoch ──────────────────────────────────────────────
    # 총 200 epoch의 10% — pretrained attention 보호
    warmup_epochs: 20
    freeze_last_layer_epochs: 1
    cosine_epochs: 180      # warmup(20) + cosine(180) = 200 총 epoch
  momentum:
    start: 0.994
    peak: 0.994
    end: 0.998
    warmup_epochs: 0
