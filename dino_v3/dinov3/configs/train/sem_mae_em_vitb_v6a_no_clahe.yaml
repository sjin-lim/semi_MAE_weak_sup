# ============================================================
# semi_MAE — DINOv3 ViT-B Ablation v6a (CLAHE OFF only)
#
# 목적:
#   v4_ibot_ft teacher에서 resume, augmentation 중 CLAHE만 끄고
#   30 epoch 추가 학습하여 inter_sim[1,2] 변화 측정.
#
# 가설:
#   CLAHE가 만드는 multi-view contrast 변형 → SSL invariance로 학습 →
#   1-2 분리 신호 (옅은 회색 차이) 가 invariant 영역에 포함되어 무력화.
#   CLAHE off 로 invariance 학습 압력 제거.
#
# 변수 격리:
#   - CLAHE: ON → OFF  (변경)
#   - Gamma/Poisson/DiskBlur: default 유지 (다른 ablation에서 격리)
#   - 해상도: 448 (high-res adapt 영향 배제)
#   - iBOT 강화 설정: v4_ibot_ft 와 동일 (변수 X)
#   - Gram: OFF (lock-in 회피)
#
# 학습량:
#   30 epoch × 320 step = 9,600 total steps
#   ≈ 4~6 시간 (4×H200, ViT-B + 448)
#
# 실행:
#   python dinov3/train/train.py \
#       --config-file dinov3/configs/train/sem_mae_em_vitb_v6a_no_clahe.yaml \
#       --no-resume \
#       train.dataset_path="WebDataset:path=/path/to/shards" \
#       train.output_dir=/path/to/output_v6a_no_clahe \
#       student.resume_from_teacher_chkpt=/path/to/v4_ibot_ft/.../teacher_checkpoint.pth
# ============================================================

MODEL:
  META_ARCHITECTURE: SSLMetaArch
  DEVICE: cuda
  WEIGHTS: ''
  DTYPE: float32

compute_precision:
  param_dtype: bf16
  reduce_dtype: fp32
  sharding_strategy: SHARD_GRAD_OP

dino:
  loss_weight: 1.0
  global_ignore_diagonal: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024
  koleo_loss_weight: 0.1
  koleo_loss_distributed: false
  koleo_topk: 1

ibot:
  loss_weight: 1.5
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  mask_random_circular_shift: false
  information_aware_masking: true
  masking_temperature: 0.3
  force_masking_even_with_zero_weight: false
  separate_head: true
  head_n_prototypes: 32768
  head_bottleneck_dim: 256
  head_norm_last_layer: false
  head_nlayers: 3
  head_hidden_dim: 1024

gram:
  use_loss: false
  compute_stats: false
  loss_weight: 0.0
  ema_teacher: false
  ckpt: null
  it_load_ema_teacher: -1
  rep_update: false
  update_frequency: 10000
  it_first_update: 999999999
  max_updates: 0
  normalized: true
  img_level: true
  remove_neg: false
  remove_only_teacher_neg: false
  tokens_used: all
  global_teacher_resize_method: bicubic
  global_teacher_resize_antialias: false

train:
  dataset_path: "WebDataset:path=<FILL_IN>/shards"
  output_dir: "./output_dino_em_vitb_v6a_no_clahe"

  batch_size_per_gpu: 128
  num_workers: 10
  seed: 0
  OFFICIAL_EPOCH_LENGTH: 320

  saveckp_freq: 5
  cache_dataset: false
  checkpointing: true
  checkpointing_full: true
  compile: true
  centering: sinkhorn_knopp

student:
  arch: vit_base
  patch_size: 16
  pretrained_weights: ''
  resume_from_teacher_chkpt: ''       # CLI override
  drop_path_rate: 0.2
  layerscale: 1.0e-05
  drop_path_uniform: true
  ffn_layer: mlp
  ffn_ratio: 4.0
  block_chunks: 0
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  in_chans: 3
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2

teacher:
  momentum_teacher: 0.998
  final_momentum_teacher: 0.9995
  warmup_teacher_temp: 0.07
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

optim:
  epochs: 30
  optimizer: adamw
  weight_decay: 0.15
  weight_decay_end: 0.15
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999

crops:
  global_crops_size: 448
  local_crops_size: 224
  global_crops_scale:
    - 0.32
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.32
  local_crops_number: 8
  horizontal_flips: true
  share_color_jitter: false
  instance_norm: true
  # ── 핵심 변경: CLAHE OFF ─────────────────────────────────────────────
  clahe: false
  # 다른 intensity aug 는 default 유지 (gamma_p=0.5, poisson_p=0.3, disk_blur_p_*=defaults)
  # intensity_aug 키 자체를 생략하면 default 값 사용
  rgb_mean:
    - 0.485
    - 0.456
    - 0.406
  rgb_std:
    - 0.229
    - 0.224
    - 0.225

checkpointing:
  period: 1600
  max_to_keep: 5
  keep_every: 99999999999999

evaluation:
  eval_period_iterations: 1600

schedules:
  weight_decay:
    start: 0.15
    peak: 0.15
    end: 0.15
    warmup_epochs: 0
  teacher_temp:
    start: 0.07
    peak: 0.07
    end: 0.07
    warmup_epochs: 0
  lr:
    start: 0
    peak: 0.00005
    end: 1.0e-06
    warmup_epochs: 3
    freeze_last_layer_epochs: 0
    cosine_epochs: 27
  momentum:
    start: 0.998
    peak: 0.998
    end: 0.9995
    warmup_epochs: 0
